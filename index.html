<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar Flex — Diagnóstico de saúde do condomínio</title>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
<style>
:root{
  --grafite:#1C1C1C; --surf:#232323; --surf2:#2A2A2A; --line:#3a3a3a;
  --ambar:#E8B500; --txt:#F5F5F5; --txt2:#B5B5B5;
  --bom:#3FB984; --atencao:#E8B500; --critico:#D9534F;
  --r:14px;
  --font:"Satoshi","Inter","Segoe UI",system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--grafite);color:var(--txt);font-family:var(--font);-webkit-font-smoothing:antialiased;font-feature-settings:"tnum"}
body{min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:480px;min-height:100vh;padding:24px 20px 40px;position:relative;display:flex;flex-direction:column}
.logo{height:30px;width:auto;display:block}
.logo-wrap{display:flex;justify-content:center;margin-bottom:8px}
.hidden{display:none!important}
button{font-family:var(--font);cursor:pointer;border:none}

/* botão principal */
.btn{background:var(--ambar);color:var(--grafite);font-weight:900;font-size:17px;padding:18px 24px;border-radius:var(--r);width:100%;letter-spacing:.2px;transition:transform .15s, filter .15s}
.btn:hover{filter:brightness(1.05)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--txt2);font-weight:700;font-size:15px;padding:12px;width:100%}
.btn-ghost:hover{color:var(--txt)}

/* ---------- INTRO ---------- */
.intro{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;gap:22px;padding:20px 0}
.sweep{position:relative;width:220px;height:220px;margin:0 auto}
.sweep svg{position:absolute;inset:0}
.sweep .cone{transform-origin:110px 110px;animation:spin 4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.intro h1{font-size:34px;line-height:1.05;font-weight:900;letter-spacing:-.5px}
.intro h1 b{color:var(--ambar)}
.intro p{color:var(--txt2);font-size:16px;line-height:1.5;max-width:360px;margin:0 auto}
.trust{color:var(--txt2);font-size:12.5px;letter-spacing:.3px;opacity:.8}
.trust b{color:var(--txt);font-weight:700}

/* ---------- QUIZ ---------- */
.top{display:flex;align-items:center;gap:14px;margin-bottom:32px}
.bar{flex:1;height:6px;background:var(--surf2);border-radius:99px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--ambar);width:0;border-radius:99px;transition:width .35s ease}
.count{font-size:13px;color:var(--txt2);font-weight:700;white-space:nowrap}
.eyebrow{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ambar);margin-bottom:10px}
.q{font-size:24px;font-weight:900;line-height:1.2;letter-spacing:-.3px;margin-bottom:26px}
.opts{display:flex;flex-direction:column;gap:11px}
.opt{background:var(--surf);border:1.5px solid var(--line);color:var(--txt);text-align:left;padding:17px 18px;border-radius:var(--r);font-size:15.5px;font-weight:500;line-height:1.35;transition:border-color .15s,background .15s,transform .1s;display:flex;align-items:center;gap:13px}
.opt:hover{border-color:var(--ambar)}
.opt:active{transform:scale(.99)}
.opt.sel{border-color:var(--ambar);background:#2f2a17}
.dot{width:18px;height:18px;border-radius:99px;border:2px solid var(--line);flex:none;transition:.15s}
.opt.sel .dot{border-color:var(--ambar);background:var(--ambar);box-shadow:inset 0 0 0 3px var(--surf)}
.back{margin-top:24px}

/* ---------- FORM ---------- */
.form-h{font-size:26px;font-weight:900;letter-spacing:-.3px;margin-bottom:6px}
.form-sub{color:var(--txt2);font-size:15px;margin-bottom:26px;line-height:1.45}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:700;color:var(--txt2);margin-bottom:7px;letter-spacing:.2px}
.field input{width:100%;background:var(--surf);border:1.5px solid var(--line);border-radius:var(--r);padding:15px 16px;color:var(--txt);font-size:16px;font-family:var(--font);transition:border-color .15s}
.field input:focus{outline:none;border-color:var(--ambar)}
.field input::placeholder{color:#6a6a6a}
.lgpd{display:flex;gap:11px;align-items:flex-start;margin:20px 0 24px;cursor:pointer}
.lgpd input{margin-top:3px;width:18px;height:18px;accent-color:var(--ambar);flex:none}
.lgpd span{font-size:12.5px;color:var(--txt2);line-height:1.4}

/* ---------- RESULT ---------- */
.res-head{text-align:center;margin:8px 0 26px}
.res-head .pre{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt2);margin-bottom:8px}
.res-head h2{font-size:28px;font-weight:900;letter-spacing:-.4px;line-height:1.1}
.res-head .for{color:var(--txt2);font-size:14px;margin-top:8px}
.res-head .for b{color:var(--ambar)}

.gauge-wrap{position:relative;width:230px;height:230px;margin:6px auto 14px}
.gauge-wrap .sweep{position:absolute;inset:0;opacity:.5}
.gauge-wrap svg.ring{position:absolute;inset:0;transform:rotate(-90deg)}
.gauge-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge-num{font-size:62px;font-weight:900;line-height:1;letter-spacing:-2px}
.gauge-num span{font-size:24px;color:var(--txt2);font-weight:700}
.faixa{text-align:center;font-weight:900;font-size:19px;letter-spacing:-.2px;margin-bottom:6px}
.faixa-desc{text-align:center;color:var(--txt2);font-size:14.5px;line-height:1.45;max-width:380px;margin:0 auto 30px}

.sec-title{font-size:13px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--txt2);margin:28px 0 14px}
.radar-card{background:var(--surf);border:1px solid var(--line);border-radius:var(--r);padding:18px 12px 8px}
.radar-card svg{width:100%;height:auto;display:block}

.bd{display:flex;flex-direction:column;gap:13px;margin-top:6px}
.bd-row .bd-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.bd-row .bd-name{font-size:14.5px;font-weight:700}
.bd-row .bd-val{font-size:14px;font-weight:900}
.bd-track{height:8px;background:var(--surf2);border-radius:99px;overflow:hidden}
.bd-track i{display:block;height:100%;border-radius:99px;width:0;transition:width .8s ease}

.rec{background:var(--surf);border:1px solid var(--line);border-left:3px solid var(--ambar);border-radius:10px;padding:16px 17px;margin-bottom:11px}
.rec h4{font-size:15.5px;font-weight:900;margin-bottom:7px;display:flex;align-items:center;gap:8px}
.rec h4 .tag{font-size:11px;font-weight:900;padding:3px 8px;border-radius:6px;letter-spacing:.3px}
.rec p{font-size:14px;color:var(--txt2);line-height:1.5}
.pos{border-left-color:var(--bom)}
.insight{background:#2f2a17;border:1px solid #4a4220;border-radius:10px;padding:14px 16px;margin-bottom:11px;font-size:13.5px;line-height:1.5;color:#f0e4b8;display:flex;gap:10px}
.insight b{color:var(--ambar)}

/* SELO */
.seal{background:linear-gradient(160deg,#262626,#1a1a1a);border:1px solid var(--ambar);border-radius:18px;padding:26px 22px;text-align:center;position:relative;overflow:hidden;margin-top:6px}
.seal::before{content:"";position:absolute;inset:-40%;background:radial-gradient(circle at 50% 0,rgba(232,181,0,.18),transparent 60%)}
.seal>*{position:relative}
.seal .seal-logo{height:24px;margin:0 auto 16px;display:block}
.seal .ribbon{font-size:11px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:var(--ambar);margin-bottom:6px}
.seal .seal-cond{font-size:22px;font-weight:900;letter-spacing:-.3px;line-height:1.15;margin-bottom:14px}
.seal .seal-badge{font-size:13px;color:var(--txt2);margin-bottom:18px}
.seal .seal-score{font-size:46px;font-weight:900;color:var(--ambar);line-height:1}
.seal .seal-score span{font-size:18px;color:var(--txt2)}
.seal .seal-foot{font-size:11px;color:var(--txt2);letter-spacing:.5px;margin-top:14px;border-top:1px solid var(--line);padding-top:14px}
.seal-msg{text-align:center;color:var(--txt2);font-size:13.5px;line-height:1.5;margin:14px 0 6px}
.seal-msg b{color:var(--txt)}

.cta-block{margin-top:34px;background:var(--surf);border:1px solid var(--line);border-radius:18px;padding:24px 20px;text-align:center}
.cta-block h3{font-size:20px;font-weight:900;letter-spacing:-.3px;margin-bottom:8px}
.cta-block p{font-size:14px;color:var(--txt2);line-height:1.5;margin-bottom:18px}
.actions{margin-top:14px;display:flex;flex-direction:column;gap:8px}

.foot{text-align:center;color:#5e5e5e;font-size:11.5px;margin-top:34px;letter-spacing:.3px}

/* fade */
.screen{animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important}
}

/* telas estreitas */
@media (max-width:380px){
  .app{padding:20px 15px 36px}
  .intro h1{font-size:28px}
  .intro p{font-size:15px}
  .sweep{width:180px;height:180px}
  .gauge-wrap .sweep{width:auto;height:auto}
  .q{font-size:21px}
  .opt{padding:15px 15px;font-size:15px}
  .gauge-wrap{width:200px;height:200px}
  .gauge-num{font-size:52px}
  .res-head h2{font-size:24px}
  .radar-card{padding:14px 6px 6px}
}

/* ---------- PRINT ---------- */
@media print{
  body{background:#fff;color:#1C1C1C}
  .app{max-width:none}
  .no-print{display:none!important}
  .sweep,.gauge-wrap .sweep{display:none!important}
  .radar-card,.rec,.cta-block,.bd-track,.insight{background:#fff!important;border-color:#ddd!important}
  .res-head h2,.gauge-num,.faixa,.sec-title,.bd-name,.bd-val,.q{color:#1C1C1C!important}
  .faixa-desc,.res-head .pre,.rec p,.bd-row{color:#444!important}
  .gauge-num{font-size:48px}
  .seal{background:#fff!important;color:#1C1C1C!important}
  .seal .seal-cond{color:#1C1C1C!important}
}
</style>

  const pct = Math.round((state.idx)/TOTAL*100);
  const selected = item.type==="caract" ? state.caract[item.key] : (state.scored[state.idx]!==undefined ? state.scored[state.idx].i : null);
  const opts = item.opts.map((o,i)=>{
    const label = item.type==="caract" ? o : o[0];
    const sel = (item.type==="caract" ? state.caract[item.key]===label : (selected===i)) ? "sel":"";
    return `<button class="opt ${sel}" onclick="choose(${i})"><span class="dot"></span><span>${label}</span></button>`;
  }).join("");
  app.innerHTML = `
  <div class="screen">
    <div class="top">
      <div class="bar"><i style="width:${pct}%"></i></div>
      <div class="count">${num}/${TOTAL}</div>
    </div>
    <div class="eyebrow">${item.eyebrow}</div>
    <div class="q">${item.q}</div>
    <div class="opts">${opts}</div>
    ${state.idx>0 ? `<button class="btn-ghost back" onclick="prev()">← Voltar</button>`:``}
  </div>`;
}

function choose(i){
  const item = QUEUE[state.idx];
  if(item.type==="caract"){ state.caract[item.key]=item.opts[i]; }
  else { state.scored[state.idx]={axis:item.axis,value:item.opts[i][1],i}; }
  // feedback visual rápido + avança
  const btns=document.querySelectorAll(".opt"); btns.forEach((b,bi)=>b.classList.toggle("sel",bi===i));
  setTimeout(()=>{
    if(state.idx < TOTAL-1){ state.idx++; renderQuestion(); }
    else { renderForm(); }
  },180);
}
function prev(){ if(state.idx>0){ state.idx--; renderQuestion(); } }

function renderForm(){
  app.innerHTML = `
  <div class="screen">
    ${logoBar()}
    <div class="form-h">Quase lá!</div>
    <div class="form-sub">Preencha os dados pra montar o diagnóstico personalizado do seu condomínio.</div>
    <div class="field"><label>Nome do condomínio</label><input id="f_cond" placeholder="Ex.: Residencial Aurora" value="${state.lead.cond||''}"></div>
    <div class="field"><label>Seu nome</label><input id="f_nome" placeholder="Nome do síndico(a)" value="${state.lead.nome||''}"></div>
    <div class="field"><label>E-mail</label><input id="f_email" type="email" placeholder="voce@email.com" value="${state.lead.email||''}"></div>
    <div class="field"><label>WhatsApp</label><input id="f_wpp" inputmode="numeric" placeholder="(00) 00000-0000" value="${state.lead.wpp||''}"></div>
    <label class="lgpd"><input type="checkbox" id="f_lgpd"><span>Autorizo a Flex a usar meus dados para entrar em contato sobre o diagnóstico.</span></label>
    <button class="btn" id="f_btn" disabled onclick="submitLead()">Ver meu diagnóstico</button>
    <button class="btn-ghost back" onclick="prev()">← Voltar</button>
  </div>`;
  const wpp=document.getElementById("f_wpp");
  wpp.addEventListener("input",e=>{
    let v=e.target.value.replace(/\D/g,"").slice(0,11);
    if(v.length>=7) v=`(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
    else if(v.length>=3) v=`(${v.slice(0,2)}) ${v.slice(2)}`;
    else if(v.length>=1) v=`(${v}`;
    e.target.value=v;
    validate();
  });
  ["f_cond","f_nome","f_email","f_lgpd"].forEach(id=>document.getElementById(id).addEventListener("input",validate));
}
function validate(){
  const cond=document.getElementById("f_cond").value.trim();
  const nome=document.getElementById("f_nome").value.trim();
  const email=document.getElementById("f_email").value.trim();
  const wpp=document.getElementById("f_wpp").value.replace(/\D/g,"");
  const lgpd=document.getElementById("f_lgpd").checked;
  const ok = cond && nome && /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email) && wpp.length>=10 && lgpd;
  document.getElementById("f_btn").disabled=!ok;
}
function submitLead(){
  state.lead={
    cond:document.getElementById("f_cond").value.trim(),
    nome:document.getElementById("f_nome").value.trim(),
    email:document.getElementById("f_email").value.trim(),
    wpp:document.getElementById("f_wpp").value.trim()
  };
  const r=computeScores();
  sendData(r);
  renderResult(r);
}

/* ================= CÁLCULO ================= */
function computeScores(){
  const byAxis={};
  AXES.forEach(a=>byAxis[a.key]=[]);
  state.scored.forEach(s=>{ if(s) byAxis[s.axis].push(s.value); });
  const scores={};
  AXES.forEach(a=>{ const arr=byAxis[a.key]; scores[a.key]=arr.length?Math.round(arr.reduce((x,y)=>x+y,0)/arr.length):0; });
  const geral=Math.round(AXES.reduce((s,a)=>s+scores[a.key],0)/AXES.length);
  let faixa,fcor,fdesc;
  if(geral<=40){faixa="Crítico";fcor="var(--critico)";fdesc="Seu condomínio precisa de estruturação urgente. Os pontos abaixo merecem ação imediata.";}
  else if(geral<=60){faixa="Em risco";fcor="var(--atencao)";fdesc="Há boas bases, mas pontos sérios a corrigir antes que virem dor de cabeça.";}
  else if(geral<=80){faixa="Saudável";fcor="var(--atencao)";fdesc="Condomínio bem cuidado, com espaço pra otimizar e subir de nível.";}
  else {faixa="Excelente";fcor="var(--bom)";fdesc="Condomínio modelo, gestão de referência. Isso é pra mostrar.";}
  return {scores,geral,faixa,fcor,fdesc};
}

/* ================= RADAR SVG ================= */
function radarSVG(scores){
  const W=470,H=300,cx=235,cy=150,R=100,N=5,LR=R+18;
  const ang=i=>(-90+i*72)*Math.PI/180;
  const pt=(i,r)=>[cx+r*Math.cos(ang(i)),cy+r*Math.sin(ang(i))];
  let grid="";
  [0.25,0.5,0.75,1].forEach(f=>{
    const p=Array.from({length:N},(_,i)=>pt(i,R*f).join(",")).join(" ");
    grid+=`<polygon points="${p}" fill="none" stroke="#3a3a3a" stroke-width="1"/>`;
  });
  let axes="";
  for(let i=0;i<N;i++){const [x,y]=pt(i,R);axes+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#3a3a3a" stroke-width="1"/>`;}
  const dataPts=AXES.map((a,i)=>pt(i,R*scores[a.key]/100));
  const poly=dataPts.map(p=>p.join(",")).join(" ");
  const dots=dataPts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="3.5" fill="#E8B500"/>`).join("");
  let labels="";
  AXES.forEach((a,i)=>{
    const [x,y]=pt(i,LR);
    let anchor="middle"; if(x<cx-12)anchor="end"; if(x>cx+12)anchor="start";
    const dy = (i===0)? -8 : 4;            // rótulo do topo sobe pra não bater no vértice
    labels+=`<text x="${x.toFixed(1)}" y="${(y+dy).toFixed(1)}" fill="#B5B5B5" font-size="12.5" font-weight="700" text-anchor="${anchor}" font-family="Satoshi,sans-serif">${a.label}</text>`;
    labels+=`<text x="${x.toFixed(1)}" y="${(y+dy+16).toFixed(1)}" fill="#E8B500" font-size="12" font-weight="900" text-anchor="${anchor}" font-family="Satoshi,sans-serif">${scores[a.key]}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Gráfico radar dos 5 eixos" style="overflow:visible">
    ${grid}${axes}
    <polygon points="${poly}" fill="rgba(232,181,0,.22)" stroke="#E8B500" stroke-width="2.5" stroke-linejoin="round"/>
    ${dots}${labels}
  </svg>`;
}

/* ================= RESULTADO ================= */
function renderResult(r){
  const {scores,geral,faixa,fcor,fdesc}=r;
  const today=new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"});
  const C=2*Math.PI*100;
  const off=C*(1-geral/100);

  // breakdown
  const bd=AXES.map(a=>{
    const v=scores[a.key]; const col=v>=80?"var(--bom)":v>=50?"var(--atencao)":"var(--critico)";
    return `<div class="bd-row"><div class="bd-top"><span class="bd-name">${a.label}</span><span class="bd-val" style="color:${col}">${v}</span></div>
      <div class="bd-track"><i style="background:${col}" data-w="${v}"></i></div></div>`;
  }).join("");

  // recomendações (eixos < 60, do mais fraco pro menos)
  const weak=AXES.map(a=>({k:a.key,l:a.label,v:scores[a.key]})).filter(x=>x.v<60).sort((a,b)=>a.v-b.v).slice(0,3);
  let recHtml="";
  if(weak.length){
    recHtml=weak.map(w=>{
      const tagcol=w.v<=40?"var(--critico)":"var(--atencao)";
      return `<div class="rec"><h4>${w.l} <span class="tag" style="background:${tagcol};color:#1C1C1C">${w.v}/100</span></h4><p>${REC[w.k]}</p></div>`;
    }).join("");
  } else {
    recHtml=`<div class="rec pos"><h4>Nenhum ponto crítico 👏</h4><p>Seu condomínio não tem fragilidades graves nos 5 eixos. O foco agora é manter o padrão e blindar o que já funciona.</p></div>`;
  }

  // reforço positivo (eixo mais forte >=80)
  const strong=AXES.map(a=>({k:a.key,l:a.label,v:scores[a.key]})).sort((a,b)=>b.v-a.v)[0];
  let posHtml="";
  if(strong.v>=80){ posHtml=`<div class="rec pos"><h4>Seu ponto forte: ${strong.l}</h4><p>${POS[strong.k]}</p></div>`; }

  // insights cruzados
  let ins="";
  const c=state.caract;
  if((c.unidades==="101 a 200"||c.unidades==="Mais de 200") && scores.financeira<60)
    ins+=`<div class="insight">⚠️ <span>Em um condomínio desse porte, <b>fragilidade financeira escala rápido</b> — cada mês conta.</span></div>`;
  if(c.taxa==="Acima de R$ 1.000" && scores.manutencao<60)
    ins+=`<div class="insight">⚠️ <span>Os moradores pagam caro e ainda convivem com manutenção reativa: <b>isso é cobrança garantida na próxima assembleia.</b></span></div>`;
  if(c.funcionarios==="Mais de 8" && scores.gestao<60)
    ins+=`<div class="insight">⚠️ <span>Com equipe grande e processo informal, o <b>custo de pessoal sem controle pesa direto no rateio.</b></span></div>`;

  // selo
  let seal="";
  if(geral>=81){
    seal=`<div class="sec-title">Seu selo</div>
    <div class="seal" id="seal">
      <img class="seal-logo" src="${LOGO_WHITE}" alt="Flex">
      <div class="ribbon">Selo Flex de Gestão Saudável</div>
      <div class="seal-cond">${state.lead.cond}</div>
      <div class="seal-badge">Diagnóstico Radar Flex · ${today}</div>
      <div class="seal-score">${geral}<span>/100</span></div>
      <div class="seal-foot">Avaliado em 5 eixos de gestão condominial</div>
    </div>
    <div class="seal-msg"><b>Gestão boa é pra mostrar.</b><br>Tire um print e compartilhe este selo com seus moradores.</div>`;
  }

  app.innerHTML=`
  <div class="screen">
    ${logoBar()}
    <div class="res-head">
      <div class="pre">Diagnóstico de</div>
      <h2>${state.lead.cond}</h2>
      <div class="for">Preparado para <b>${state.lead.nome}</b> · ${today}</div>
    </div>

    <div class="gauge-wrap">
      <div class="sweep" aria-hidden="true">
        <svg viewBox="0 0 230 230"><g class="cone" style="transform-origin:115px 115px">
          <defs><linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#E8B500" stop-opacity="0"/><stop offset="1" stop-color="#E8B500" stop-opacity=".4"/>
          </linearGradient></defs>
          <path d="M115 115 L115 25 A90 90 0 0 1 195 70 Z" fill="url(#g2)"/>
        </g></svg>
      </div>
      <svg class="ring" viewBox="0 0 230 230">
        <circle cx="115" cy="115" r="100" fill="none" stroke="#2A2A2A" stroke-width="12"/>
        <circle cx="115" cy="115" r="100" fill="none" stroke="${fcor}" stroke-width="12" stroke-linecap="round"
          stroke-dasharray="${C}" stroke-dashoffset="${C}" id="ringfill"/>
      </svg>
      <div class="gauge-center"><div class="gauge-num"><span id="gnum">0</span><span>/100</span></div></div>
    </div>
    <div class="faixa" style="color:${fcor}">${faixa}</div>
    <div class="faixa-desc">${fdesc}</div>

    <div class="sec-title">Sua saúde em 5 eixos</div>
    <div class="radar-card">${radarSVG(scores)}</div>

    <div class="sec-title">Detalhe por eixo</div>
    <div class="bd">${bd}</div>

    <div class="sec-title">O que priorizar</div>
    ${recHtml}${posHtml}${ins}

    ${seal}

    <div class="cta-block no-print">
      <h3>Quer destravar esses pontos?</h3>
      <p>A Flex faz um diagnóstico presencial e uma visita técnica no seu condomínio — sem compromisso. A gente mostra o caminho.</p>
      <button class="btn" onclick="agendar()">Agendar diagnóstico e visita</button>
      <div class="actions">
        <button class="btn-ghost" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
      </div>
    </div>

    <div class="foot">Radar Flex · Diagnóstico de saúde do condomínio · ${today}</div>
  </div>`;

  // animações
  requestAnimationFrame(()=>{
    document.getElementById("ringfill").style.transition="stroke-dashoffset 1.1s ease";
    document.getElementById("ringfill").style.strokeDashoffset=off;
    document.querySelectorAll(".bd-track i").forEach(el=>el.style.width=el.dataset.w+"%");
    let n=0; const step=Math.max(1,Math.round(geral/40));
    const t=setInterval(()=>{ n+=step; if(n>=geral){n=geral;clearInterval(t);} document.getElementById("gnum").textContent=n; },28);
  });
  window.scrollTo(0,0);
}

function agendar(){
  if(CONFIG.schedulingUrl){ window.open(CONFIG.schedulingUrl,"_blank"); return; }
  if(CONFIG.whatsapp){
    const msg=encodeURIComponent(`Olá! Sou ${state.lead.nome}, do condomínio ${state.lead.cond}. Fiz o Radar Flex e quero agendar o diagnóstico e a visita.`);
    window.open(`https://wa.me/${CONFIG.whatsapp}?text=${msg}`,"_blank"); return;
  }
  alert("Configure o link de agendamento (CONFIG.schedulingUrl) ou o WhatsApp (CONFIG.whatsapp).");
}

function sendData(r){
  if(!CONFIG.webhookUrl) return;
  const payload={
    sindico_nome:state.lead.nome, condominio_nome:state.lead.cond,
    email:state.lead.email, whatsapp:state.lead.wpp,
    caracterizacao:state.caract,
    respostas:state.scored.map((s,i)=>({pergunta:QUEUE.find((q,qi)=>qi===i)?.q,valor:s?s.value:null})),
    score_geral:r.geral, scores:r.scores, faixa:r.faixa, consentimento:true,
    data:new Date().toISOString()
  };
  try{ fetch(CONFIG.webhookUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)}).catch(()=>{}); }catch(e){}
}

renderIntro();
</script>
</body>
